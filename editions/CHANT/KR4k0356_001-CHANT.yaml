seq: 1
front:
  text: 序錄唐志孔衍春秋時國語十卷又春秋後國語十卷經典敘錄曰孔衍字舒元魯人東晉廣陵相史通曰孔衍以戰國策所書未為盡善乃引太史公所記參其異同刪彼二家聚為一錄號為春秋後語除二周及宋衛中山其所留者七國而已始自秦孝公終於楚漢之際比於春秋亦盡二百三十餘年行事始衍撰春秋時國語繼又撰春秋後語勒成二書為十卷今行於世者唯後語存焉案其書序元左傳莫能加世人皆尤其不量力不度德尋衍之此義自比於丘明者當謂國語非春秋傳也姚宏題戰國策曰正文遺逸如春秋後語引武靈王遊大陵夢處女鼓瑟之類略可見者如此今本所無也秦古書見於世者無幾予居窮鄉無可檢閱訪春秋後語數年方得之不為無補謨案姚氏校注戰國策時在宋紹興四年已難得見春秋後語至元至順四年吳師道辨正鮑注則云孔衍所著後語今尤不可得尚賴此見其一二益是書之亡久矣御覽本宋猶見全本故引據獨多且有注而注者為唐盧藏用則見唐志及吳氏辨正所說也今故據御覽參以文選注初學記書鈔白帖事類賦諸書共鈔出秦語十五條齊語十八條楚語七條趙語十九條魏語八條韓語二條燕語六條
